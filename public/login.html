<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · SVN Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #FAF3EC;
      color: #2B2420;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: white;
      border: 1px solid #D8CBBB;
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #221E1D;
    }
    .subtitle {
      color: #5C534C;
      font-size: 13px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }
    label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5C534C;
      font-weight: 600;
    }
    input {
      border: 1px solid #D8CBBB;
      border-radius: 9px;
      padding: 11px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #BE7F49;
    }
    button {
      width: 100%;
      background: #221E1D;
      color: white;
      border: none;
      border-radius: 9px;
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    button:hover {
      background: #000;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #a4552e;
      font-size: 12px;
      margin-top: 12px;
      min-height: 18px;
      line-height: 1.5;
    }
    .success {
      color: #4e7a5a;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>SVN Hub</h1>
    <p class="subtitle">Acesso restrito<br>Gabriel Winkelmann · Investimentos</p>
    
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••" required>
      </div>
      <div id="message" class="error"></div>
      <button type="submit">Acessar</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qevblxazhhktmtvzqgzi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFldmJseGF6aGhrdG10dnpxZ3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMDM0MTksImV4cCI6MjA5OTg3OTQxOX0.VH3O0hKxgYR1cHIUAbUdK4CIOxNacrY-J2MEVVTPKlM';
    
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    async function checkExistingAuth() {
      const { data: { user } } = await sbClient.auth.getUser();
      if (user) {
        window.location.href = 'svn_hub_supabase.html';
      }
    }
    
    checkExistingAuth();
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const messageEl = document.getElementById('message');
      const btn = e.target.querySelector('button');
      
      messageEl.textContent = '';
      messageEl.className = 'error';
      btn.disabled = true;
      
      try {
        const { data, error } = await sbClient.auth.signInWithPassword({
          email,
          password
        });
        
        if (error) {
          throw new Error(error.message);
        }
        
        messageEl.textContent = 'Autenticado! Redirecionando...';
        messageEl.className = 'success';
        
        setTimeout(() => {
          window.location.href = 'svn_hub_supabase.html';
        }, 500);
      } catch (err) {
        messageEl.textContent = 'Email ou senha incorretos';
        messageEl.className = 'error';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
